<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세 자리 수 곱하기 두 자리 수 연습 (주관식)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
        }
        /* 대시보드 (점수 및 시간 표시) */
        .dashboard {
            display: flex;
            justify-content: space-between;
            background: #e8f4fd;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 20px;
        }
        /* 난이도 선택 구역 */
        .level-area {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 10px;
        }
        .level-area label {
            font-size: 15px;
            font-weight: bold;
            margin: 0 10px;
            cursor: pointer;
        }
        /* 보여주는 구역 (SHOWAREA) */
        .show-area {
            font-size: 40px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 10px;
            background-color: #f0f8ff;
        }
        /* 선택 구역 (SELECTAREA) - 주관식 입력 */
        .select-area {
            margin: 20px 0;
        }
        .answer-input {
            width: 60%;
            padding: 12px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
        }
        .answer-input:focus {
            border-color: #3498db;
        }
        .submit-btn {
            width: 30%;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 5px;
            vertical-align: top;
        }
        .submit-btn:hover {
            background-color: #27ae60;
        }
        /* 피드백 메시지 */
        #feedback {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
            margin-top: 15px;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        
        /* 게임 완료 화면 */
        .result-screen {
            display: none;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.6;
        }
        .restart-btn {
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 제목 -->
    <h1>숫자 곱하기 주관식 게임</h1>

    <!-- 상단 정보 (진행도 및 타이머) -->
    <div class="dashboard" id="dashboard">
        <div id="scoreProgress">맞힌 개수: 0 / 10</div>
        <div id="timer">시간: 0.0초</div>
    </div>

    <!-- 게임 플레이 영역 -->
    <div id="gamePlayArea">
        <!-- 2. 난이도 선택 구역 -->
        <div class="level-area">
            <label><input type="radio" name="level" value="easy" checked onclick="resetGame()"> 쉬움 (끝자리 0)</label>
            <label><input type="radio" name="level" value="hard" onclick="resetGame()"> 보통 (랜덤 숫자)</label>
        </div>

        <!-- 3. 보여주는 구역 (SHOWAREA) -->
        <div class="show-area" id="showArea">
            0 × 0 = ?
        </div>

        <!-- 4. 아동이 선택(입력)하는 구역 (SELECTAREA) -->
        <div class="select-area" id="selectArea">
            <input type="number" id="answerInput" class="answer-input" placeholder="정답 입력" onkeyup="if(window.event.keyCode==13){checkAnswer()}">
            <button class="submit-btn" onclick="checkAnswer()">확인</button>
        </div>

        <!-- 결과 메시지 영역 -->
        <div id="feedback"></div>
    </div>

    <!-- 5. 게임 종료 시 보여줄 결과 화면 -->
    <div id="resultScreen" class="result-screen">
        <p>🎉 축하합니다! 🎉</p>
        <p>10문제를 모두 맞혔습니다!</p>
        <p style="color: #e67e22; font-size: 26px;">총 소요 시간: <span id="finalTime">0</span>초</p>
        <button class="restart-btn" onclick="resetGame()">다시 도전하기</button>
    </div>
</div>

<script>
    let correctAnswer = 0;
    let correctCount = 0;
    const targetCount = 10; // 목표 정답 개수
    
    let timerInterval = null;
    let startTime = null;
    let isGameRunning = false;

    // 랜덤 정수 생성 함수
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 타이머 시작 함수
    function startTimer() {
        startTime = performance.now();
        timerInterval = setInterval(() => {
            const currentTime = performance.now();
            const elapsedTime = ((currentTime - startTime) / 1000).toFixed(1);
            document.getElementById('timer').innerText = `시간: ${elapsedTime}초`;
        }, 100);
    }

    // 완전히 처음부터 다시 시작 (난이도 변경이나 게임 완료 후)
    function resetGame() {
        correctCount = 0;
        isGameRunning = false;
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = `시간: 0.0초`;
        document.getElementById('scoreProgress').innerText = `맞힌 개수: 0 / ${targetCount}`;
        
        document.getElementById('gamePlayArea').style.display = 'block';
        document.getElementById('dashboard').style.display = 'flex';
        document.getElementById('resultScreen').style.display = 'none';
        
        nextQuestion();
    }

    // 다음 문제 생성 (무제한 생성)
    function nextQuestion() {
        const feedback = document.getElementById('feedback');
        feedback.innerText = '';
        feedback.className = '';
        
        const inputField = document.getElementById('answerInput');
        inputField.value = '';
        inputField.focus();

        const level = document.querySelector('input[name="level"]:checked').value;
        let num1, num2;

        if (level === 'easy') {
            num1 = getRandomInt(10, 99) * 10; 
            num2 = getRandomInt(1, 9) * 10;
        } else {
            num1 = getRandomInt(100, 999);
            num2 = getRandomInt(10, 99);
        }

        correctAnswer = num1 * num2;
        document.getElementById('showArea').innerText = `${num1} × ${num2} = ?`;
    }

    // 정답 확인 함수
    function checkAnswer() {
        // 첫 입력을 시작하면 타이머 작동
        if (!isGameRunning) {
            isGameRunning = true;
            startTimer();
        }

        const inputField = document.getElementById('answerInput');
        const userAnswer = parseInt(inputField.value);
        const feedback = document.getElementById('feedback');

        if (isNaN(userAnswer)) {
            feedback.innerText = "숫자를 입력해주세요!";
            feedback.className = "wrong";
            return;
        }

        if (userAnswer === correctAnswer) {
            correctCount++;
            document.getElementById('scoreProgress').innerText = `맞힌 개수: ${correctCount} / ${targetCount}`;
            
            // 10개를 모두 맞혔을 때
            if (correctCount >= targetCount) {
                endGame();
            } else {
                feedback.innerText = "🎉 정답입니다!";
                feedback.className = "correct";
                setTimeout(nextQuestion, 800); // 정답이면 0.8초 뒤 다음 문제로
            }
        } else {
            feedback.innerText = "틀렸어요! 다시 계산해보세요.";
            feedback.className = "wrong";
            inputField.select(); // 틀렸을 때 숫자를 바로 다시 쓸 수 있게 드래그 선택 처리
        }
    }

    // 게임 종료 처리
    function endGame() {
        clearInterval(timerInterval);
        const currentTime = performance.now();
        const finalTime = ((currentTime - startTime) / 1000).toFixed(1);
        
        // 정답 구역 숨기고 결과창 띄우기
        document.getElementById('gamePlayArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('finalTime').innerText = finalTime;
    }

    // 페이지 로드 시 게임 초기화
    window.onload = resetGame;
</script>

</body>
</html>
